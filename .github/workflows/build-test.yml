name: Build & Test

on:
  push:
    branches:
      - '*'
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --python ${{ matrix.python-version }} --all-extras --dev
        timeout-minutes: 10

      - name: Run tests that don't require Stata
        run: |
          uv run pytest -v -m "not requires_stata"
        timeout-minutes: 15

      - name: Build package
        run: |
          uv build
        timeout-minutes: 5

      - name: Test installation in clean environment
        shell: bash
        run: |
          # Create fresh venv using the uv-managed Python
          uv run python -m venv test_venv

          # Activate and install
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            source test_venv/Scripts/activate
          else
            source test_venv/bin/activate
          fi

          # Install built wheel
          pip install dist/*.whl

          # Test critical imports and version
          python -c "
          import pystata_x
          print(f'[OK] Import successful (v{pystata_x.__version__})')
          assert isinstance(pystata_x.__version__, str) and len(pystata_x.__version__) > 0, f'Invalid version: {pystata_x.__version__!r}'
          "
        timeout-minutes: 10

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            dist/
            *.log
          retention-days: 7
