name: Build & Test

on:
  push:
    branches:
      - '*'
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build C library with CMake on all platforms ────────────────────────
  build_c:
    name: Build C library (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Configure CMake
        run: |
          cmake -S src/stata-fast -B src/stata-fast/build \
            -DSTATA_PATH="/usr/local/stata" \
            -DSTATA_EDITION=se

      - name: Build C library
        run: |
          cmake --build src/stata-fast/build --verbose

      - name: CTest
        working-directory: src/stata-fast/build
        run: ctest -V || echo "ctest skipped (no Stata installed)"

      - name: Upload C library artifact
        uses: actions/upload-artifact@v4
        with:
          name: libstata_fast-${{ matrix.os }}
          path: |
            src/stata-fast/build/libstata_fast.*
            src/stata-fast/build/stata_fast.dll
            src/stata-fast/build/Release/stata_fast.dll
          retention-days: 3

  # ── Python tests (unit, no Stata needed) ──────────────────────────────
  python_test:
    name: Python tests (${{ matrix.os }})
    needs: [build_c]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Restore cached virtual environment
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          uv sync --python 3.14 --all-extras --dev --frozen
        timeout-minutes: 5

      - name: Download C library
        uses: actions/download-artifact@v4
        with:
          name: libstata_fast-${{ matrix.os }}
          path: src/stata-fast/build

      - name: Copy C library into Python package
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp src/stata-fast/build/stata_fast.dll src/pystata_x/ 2>/dev/null || \
            cp "src/stata-fast/build/Release/stata_fast.dll" src/pystata_x/ 2>/dev/null || \
            echo "WARNING: DLL not found"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp src/stata-fast/build/libstata_fast.dylib src/pystata_x/
          else
            cp src/stata-fast/build/libstata_fast.so src/pystata_x/
          fi

      - name: Run fast tests (unit, parallelised)
        run: |
          uv run pytest -v -n auto -m "fast" --cov --cov-report=term-missing
        timeout-minutes: 5

      - name: Build package (with C library in wheel)
        run: |
          uv build
        timeout-minutes: 5

      - name: Test installation in clean environment
        shell: bash
        run: |
          uv run python -m venv test_venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            source test_venv/Scripts/activate
          else
            source test_venv/bin/activate
          fi
          pip install dist/*.whl
          python -c "
          import pystata_x
          print(f'[OK] Import successful (v{pystata_x.__version__})')
          assert isinstance(pystata_x.__version__, str) and len(pystata_x.__version__) > 0, f'Invalid version: {pystata_x.__version__!r}'
          "
          # Verify the C library was bundled
          python -c "
          import pystata_x._stata_fast as sf
          # This should at least load the ctypes module (lib may not be fully functional without Stata)
          print(f'[OK] _stata_fast module loaded')
          "
        timeout-minutes: 10

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}-py3.14
          path: |
            dist/
            *.log
          retention-days: 7

  # ── Stata bridge tests (requires Stata installation) ──────────────────
  stata_test:
    name: Stata bridge tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]  # Only macOS has Stata installed in this repo
      fail-fast: false
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Restore cached virtual environment
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          uv sync --python 3.14 --all-extras --dev --frozen
        timeout-minutes: 5

      - name: Build C library
        run: |
          cmake -S src/stata-fast -B src/stata-fast/build \
            -DSTATA_PATH="/Applications/StataNow" \
            -DSTATA_EDITION=se
          cmake --build src/stata-fast/build

      - name: Run C tests via ctest
        run: |
          cd src/stata-fast/build && ctest -V

      - name: Run Python bridge tests
        env:
          STATA_PATH: /Applications/StataNow
          STATA_EDITION: se
        run: |
          # Smoke test the C bridge from Python
          uv run python -c "
          import sys
          sys.path.insert(0, 'src')
          from pystata_x import _stata_fast as sf

          # Init
          sf.init('/Applications/StataNow', 'se', splash=False)

          # display 1+1
          out, rc = sf.execute('display 1+1')
          assert rc == 0, f'display 1+1 rc={rc}'
          assert '2' in out, f'display 1+1 output: {out!r}'
          print(f'  smoke display 1+1: rc={rc} out={out!r} OK')

          # sysuse + regress (multi-line)
          out, rc = sf.execute('sysuse auto, clear\\nregress price mpg weight')
          assert rc == 0, f'regress rc={rc}'
          assert 'price' in out, f'regress output missing: {out[:100]!r}'
          print(f'  smoke sysuse+regress: rc={rc} OK')

          # Error command
          out, rc = sf.execute('no_such_command')
          assert rc != 0, f'error rc={rc}'
          print(f'  smoke error: rc={rc} OK')

          print('All Python bridge smoke tests PASSED')
          "

      - name: Run benchmarks (fast subset)
        env:
          STATA_PATH: /Applications/StataNow
          STATA_EDITION: se
        run: |
          uv run python benchmarks/bench_stata_fast.py --iterations 10 2>&1 | tail -20

      - name: Commit benchmark results
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add benchmarks/history/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update benchmark results [skip ci]"
          git push

  # ── cibuildwheel (pre-built platform wheels) ─────────────────────────
  cibuildwheel:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          # Windows ARM wheels are cross-compiled from x86_64 runner
          # using MSVC ARM64 cross-compiler toolchain
      fail-fast: false
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Set up cibuildwheel
        uses: pypa/cibuildwheel@v2.23

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 5
